<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASEMboi — AI & Robotics</title>
  <meta name="description" content="ASEM NSEP AI & Robotics track — our team's projects and robots.">
  <link rel="icon" href="ASEMboi.png">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <nav class="navbar">
    <img src="ASEMboi.png" alt="ASEMboi" class="nav-logo">
  </nav>

  <header class="hero">
    <div class="hero-inner">
      <h1>We Build Robots.</h1>
      <p>ASEM NSEP AI &amp; Robotics Track — our projects, our machines, our journey.</p>
    </div>
  </header>

  <main class="projects-section">
    <div class="section-header">
      <h2 class="section-title">Projects</h2>
    </div>
    <div class="projects-grid" id="projects-grid">
      <div class="loading">
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>ASEMboi &mdash; ASEM NSEP AI &amp; Robotics Track</p>
  </footer>

  <!-- Project Modal -->
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title"></h2>
        <div class="modal-meta">
          <span class="modal-date" id="modal-date"></span>
          <div class="modal-tags" id="modal-tags"></div>
        </div>
      </div>
      <p class="modal-description" id="modal-description"></p>
      <div class="modal-gallery" id="modal-gallery"></div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
    <button class="lightbox-nav prev" id="lb-prev" aria-label="Previous">&#8249;</button>
    <img class="lightbox-img" id="lb-img" src="" alt="">
    <button class="lightbox-nav next" id="lb-next" aria-label="Next">&#8250;</button>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
